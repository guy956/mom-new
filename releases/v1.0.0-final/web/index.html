  <style>
    /* Critical CSS inlined for performance */
    *, *::before, *::after {
      box-sizing: border-box;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    
    body {
      background-color: #FCFAF9;
      font-family: 'Heebo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    
    /* MOMIT branded loading splash - Optimized */
    #momit-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #FDF5F6 0%, #F9F5F4 50%, #FCFAF9 100%);
      z-index: 9999;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
    }
    
    #momit-loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    
    .momit-logo {
      width: 100px;
      height: 100px;
      border-radius: 28px;
      background: linear-gradient(135deg, #D4A1AC, #C4939C);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 30px rgba(212, 161, 172, 0.3);
      animation: momitPulse 1.8s ease-in-out infinite;
      will-change: transform;
    }
    
    .momit-logo svg {
      width: 50px;
      height: 50px;
      fill: white;
    }
    
    .momit-title {
      margin-top: 24px;
      font-size: 28px;
      font-weight: 800;
      color: #1E1517;
      letter-spacing: -0.5px;
    }
    
    .momit-slogan {
      margin-top: 8px;
      font-size: 14px;
      color: #D4A1AC;
      font-weight: 600;
    }
    
    .momit-dots {
      margin-top: 32px;
      display: flex;
      gap: 8px;
    }
    
    .momit-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #D4A1AC;
      animation: momitDotBounce 1.2s ease-in-out infinite;
      will-change: transform, opacity;
    }
    
    .momit-dot:nth-child(2) { animation-delay: 0.15s; }
    .momit-dot:nth-child(3) { animation-delay: 0.3s; }
    
    @keyframes momitPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
    
    @keyframes momitDotBounce {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }
    
    /* Loading progress bar */
    .momit-progress {
      margin-top: 32px;
      width: 200px;
      height: 4px;
      background: rgba(212, 161, 172, 0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .momit-progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #D4A1AC, #C4939C);
      border-radius: 2px;
      transition: width 0.3s ease;
      animation: momitProgress 3s ease-out forwards;
    }
    
    @keyframes momitProgress {
      0% { width: 0%; }
      20% { width: 20%; }
      50% { width: 60%; }
      80% { width: 85%; }
      100% { width: 95%; }
    }
    
    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      .momit-logo,
      .momit-dot,
      .momit-progress-bar {
        animation: none;
      }
      #momit-loading {
        transition: none;
      }
    }
    
    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #1E1517;
      }
      #momit-loading {
        background: linear-gradient(180deg, #2A2022 0%, #1E1517 50%, #1E1517 100%);
      }
      .momit-title {
        color: #F5F0EE;
      }
      .momit-slogan {
        color: #DBC8B0;
      }
    }
  </style>

    <div class="momit-title">MOMIT</div>
    <div class="momit-slogan">כי רק אמא מבינה אמא</div>
    <div class="momit-dots" aria-hidden="true">
      <div class="momit-dot"></div>
      <div class="momit-dot"></div>
      <div class="momit-dot"></div>
    </div>
    <div class="momit-progress" aria-hidden="true">
      <div class="momit-progress-bar"></div>
    </div>
  </div>

  <!-- Legal footer - visible to crawlers for Google/Apple compliance -->
  <footer id="momit-legal-footer" style="position:fixed;bottom:0;left:0;right:0;background:#F9F5F4;border-top:1px solid #E5DADC;padding:12px 24px;text-align:center;z-index:9998;font-family:'Heebo',sans-serif;font-size:13px;color:#7A6E70;transition:opacity 0.3s ease;">

      <span style="margin:0 8px;" aria-hidden="true">|</span>
      <a href="/terms" style="color:#D4A1AC;text-decoration:none;font-weight:600;" rel="terms-of-service">תנאי שימוש</a>

    </nav>
  </footer>

  <script>
    // Service Worker Registration for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/flutter_service_worker.js')
          .then(function(registration) {
            console.log('[MOMIT] ServiceWorker registered:', registration.scope);
          })
          .catch(function(error) {
            console.log('[MOMIT] ServiceWorker registration failed:', error);
          });
      });
    }
    
    // Remove loading splash and legal footer when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('momit-loading');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(function() { 
          loader.remove(); 
        }, 500);
      }
      var footer = document.getElementById('momit-legal-footer');
      if (footer) { 
        footer.style.opacity = '0';
        setTimeout(function() { footer.remove(); }, 300);
      }
    });
    
    // Fallback: remove loader after 12 seconds max (reduced from 15)
    setTimeout(function() {
      var loader = document.getElementById('momit-loading');
      if (loader && !loader.classList.contains('fade-out')) {
        loader.classList.add('fade-out');
        setTimeout(function() { loader.remove(); }, 500);
      }
    }, 12000);
    
    // Error handling
    window.onerror = function(message, source, lineno, colno, error) {
      console.error('[MOMIT] Global error:', { message, source, lineno, colno, error });
      // Remove loader on error to show error UI
      var loader = document.getElementById('momit-loading');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(function() { loader.remove(); }, 500);
      }
    };
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
