name: mom_connect
description: MOMIT - רשת חברתית לאמהות בישראל

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  
  # State Management
  provider: ^6.1.5+1
  
  # Navigation
  go_router: ^15.1.2
  
  # Storage
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  
  # Networking
  http: ^1.5.0
  url_launcher: ^6.3.1
  
  # Firebase (LOCKED VERSIONS)
  firebase_core: 3.6.0
  firebase_auth: 5.3.1
  google_sign_in: 6.2.2
  cloud_firestore: 5.4.3
  firebase_storage: 12.3.2
  
  # Security
  crypto: ^3.0.6
  flutter_secure_storage: ^9.2.4
  dart_jsonwebtoken: ^3.2.0
  flutter_dotenv: ^5.2.1

  # Web interop
  web: ^1.1.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  path: ^1.9.0
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  fl_chart: ^0.70.2
  flutter_local_notifications: ^19.0.0
  timeago: ^3.7.0
  share_plus: ^12.0.1
  
  # PDF & Reports
  pdf: ^3.10.8
  printing: ^5.13.4
  csv: ^6.0.0
  
  # Animations
  animations: ^2.0.11
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.5
  mocktail: ^1.0.4
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/icons/
  
  # Heebo font - Primary typography for Hebrew RTL support
  # Using google_fonts package for runtime loading
